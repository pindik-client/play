<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pındık Client - Minecraft Web 1.21.11</title>
    <style>
        :root {
            --red-primary: #ff2a4b;
            --red-dark: #8b001a;
            --red-glow: rgba(255, 42, 75, 0.4);
            --green-primary: #10b981;
            --green-dark: #046c4e;
            --green-glow: rgba(16, 185, 129, 0.4);
            --bg-dark: #0a060a;
            --panel-bg: rgba(18, 12, 22, 0.78);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* WebMC Canvas Container */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Pındık Client UI Overlay */
        #pindik-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            background: radial-gradient(circle at 20% 20%, rgba(255, 42, 75, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.15) 0%, transparent 40%),
                        linear-gradient(180deg, rgba(10, 6, 10, 0.6) 0%, rgba(10, 6, 10, 0.85) 100%);
            backdrop-filter: blur(6px);
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        #pindik-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Header Bar */
        .top-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green-primary);
            box-shadow: 0 0 10px var(--green-primary);
        }

        .version-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
        }

        .avatar-box {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--red-primary), var(--green-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Menu Content */
        .menu-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            max-width: 420px;
        }

        .logo-box {
            text-align: center;
        }

        .logo-title {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--red-primary) 30%, #ffffff 50%, var(--green-primary) 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 42, 75, 0.3);
            text-transform: uppercase;
        }

        .logo-subtitle {
            font-size: 0.95rem;
            color: var(--green-primary);
            letter-spacing: 3px;
            font-weight: 700;
            margin-top: -4px;
            text-transform: uppercase;
        }

        /* Button Grid */
        .button-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-pindik {
            position: relative;
            width: 100%;
            padding: 14px 20px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-pindik::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--red-primary), var(--green-primary));
            transition: width 0.25s ease;
        }

        .btn-pindik:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 42, 75, 0.4);
            box-shadow: 0 6px 20px rgba(255, 42, 75, 0.25), 0 0 15px rgba(16, 185, 129, 0.15);
            background: rgba(30, 18, 36, 0.88);
        }

        .btn-pindik:hover::before {
            width: 100%;
            opacity: 0.12;
        }

        .btn-pindik .btn-icon {
            font-size: 1.2rem;
            z-index: 2;
        }

        .btn-pindik .btn-text {
            z-index: 2;
            flex-grow: 1;
            text-align: left;
            margin-left: 12px;
        }

        .btn-pindik .btn-arrow {
            z-index: 2;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-pindik:hover .btn-arrow {
            opacity: 1;
            transform: translateX(4px);
            color: var(--green-primary);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Bottom Footer */
        .bottom-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .pindik-credits span {
            color: var(--red-primary);
            font-weight: 700;
        }

        /* Modal Structure */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 3, 6, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 12px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--red-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--red-primary);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.15);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--green-primary);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* In-game HUD overlay toggle button */
        #hud-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 20;
            background: rgba(10, 6, 10, 0.6);
            border: 1px solid var(--panel-border);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(4px);
        }

        #hud-toggle:hover {
            border-color: var(--green-primary);
            color: var(--green-primary);
        }
    </style>
</head>
<body>

    <!-- WebMC Canvas Wrapper -->
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Pındık Client UI Overlay -->
    <div id="pindik-overlay">
        <!-- Top Navigation / Status -->
        <div class="top-bar">
            <div class="brand-badge">
                <div class="status-dot"></div>
                <span class="version-text">PINDIK CLIENT v1.0 • WebMC 1.21.11</span>
            </div>
            <div class="user-profile">
                <div class="avatar-box">P</div>
                <span style="font-weight: 700; font-size: 0.9rem;" id="player-name">Oyuncu</span>
            </div>
        </div>

        <!-- Center Menu Box -->
        <div class="menu-center">
            <div class="logo-box">
                <h1 class="logo-title">PINDIK</h1>
                <div class="logo-subtitle">CLIENT EDITION</div>
            </div>

            <div class="button-stack">
                <button class="btn-pindik" id="btn-singleplayer">
                    <span class="btn-icon">🎮</span>
                    <span class="btn-text">Tek Oyunculu</span>
                    <span class="btn-arrow">➔</span>
                </button>

                <button class="btn-pindik" id="btn-multiplayer">
                    <span class="btn-icon">🌐</span>
                    <span class="btn-text">Çok Oyunculu (Sunucular)</span>
                    <span class="btn-arrow">➔</span>
                </button>

                <div class="btn-row">
                    <button class="btn-pindik" id="btn-pindik-settings">
                        <span class="btn-icon">⚡</span>
                        <span class="btn-text">Pındık Ayarları</span>
                    </button>
                    <button class="btn-pindik" id="btn-mc-settings">
                        <span class="btn-icon">⚙️</span>
                        <span class="btn-text">Seçenekler</span>
                    </button>
                </div>

                <button class="btn-pindik" id="btn-direct-connect" style="border-color: rgba(16, 185, 129, 0.3);">
                    <span class="btn-icon">🔌</span>
                    <span class="btn-text" style="color: var(--green-primary);">1.21.11 WebSocket Bağlan</span>
                    <span class="btn-arrow">➔</span>
                </button>
            </div>
        </div>

        <!-- Bottom Status -->
        <div class="bottom-bar">
            <div class="pindik-credits">Geliştirici: <span>Pındık Team</span></div>
            <div>FPS Limit: <span style="color: var(--green-primary); font-weight:700;">Sınırsız</span></div>
        </div>
    </div>

    <!-- HUD Toggle for In-Game Back Menu -->
    <button id="hud-toggle">☰ Pındık Menü (ESC)</button>

    <!-- Pındık Settings Modal -->
    <div class="modal-overlay" id="modal-pindik">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">⚡ Pındık Özel Ayarları</div>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>

            <div class="setting-item">
                <div class="setting-label">Kırmızı - Yeşil Tema Efekti</div>
                <label class="switch">
                    <input type="checkbox" checked id="toggle-theme-glow">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">FPS Arttırıcı (FPS Boost)</div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">Özel Crosshair (Nişangah)</div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">Sohbeti Gizle (Clean Chat)</div>
                <label class="switch">
                    <input type="checkbox" id="toggle-clean-chat">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn-pindik" id="save-settings" style="margin-top: 10px; justify-content: center;">
                Kaydet ve Kapat
            </button>
        </div>
    </div>

    <script>
        // Web Audio API Sound Effects for Pındık Buttons
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Add Sound Event Listeners
        document.querySelectorAll('.btn-pindik').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            });
            btn.addEventListener('click', playClickSound);
        });

        // UI Interactions
        const overlay = document.getElementById('pindik-overlay');
        const hudToggle = document.getElementById('hud-toggle');
        const modalPindik = document.getElementById('modal-pindik');
        const btnPindikSettings = document.getElementById('btn-pindik-settings');
        const closeModal = document.getElementById('close-modal');
        const saveSettings = document.getElementById('save-settings');

        // Toggle Pındık Settings Modal
        btnPindikSettings.addEventListener('click', () => {
            modalPindik.classList.add('active');
        });

        closeModal.addEventListener('click', () => {
            modalPindik.classList.remove('active');
        });

        saveSettings.addEventListener('click', () => {
            modalPindik.classList.remove('active');
        });

        // Simulating Game Launch
        function launchGameSession(mode) {
            overlay.classList.add('hidden');
            hudToggle.style.display = 'block';
            console.log(`[Pındık Client] Oyun başlatılıyor. Mod: ${mode}`);
        }

        document.getElementById('btn-singleplayer').addEventListener('click', () => launchGameSession('Singleplayer'));
        document.getElementById('btn-multiplayer').addEventListener('click', () => launchGameSession('Multiplayer'));
        document.getElementById('btn-direct-connect').addEventListener('click', () => {
            const serverIP = prompt("Bağlanılacak WebSocket Sunucu Adresi (wss://...):", "wss://mc.pindik.net:8443");
            if (serverIP) {
                launchGameSession(`DirectConnect: ${serverIP}`);
            }
        });

        // Toggle back to menu
        hudToggle.addEventListener('click', () => {
            overlay.classList.remove('hidden');
            hudToggle.style.display = 'none';
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                hudToggle.style.display = 'none';
            }
        });

        // Placeholder WebMC Initialization Hook
        window.eaglercraftXOpts = {
            container: "game-container",
            canvas: "game-canvas",
            assetsURI: "assets.epk",
            localesURI: "lang/",
            servers: [
                { addr: "wss://mc.pindik.net:8443", name: "Pındık Official 1.21.11" }
            ]
        };
    </script>
</body>
</html>
